# PRODUCTION DOCKER COMPOSE CONFIGURATION
# Used on the EC2 backend instance.
# Usage: docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    # Enforce memory limits to prevent crashing the EC2 instance (1 GB total RAM)
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: chatbot-backend:latest
    restart: always
    # Bind to 127.0.0.1:8000 so only Nginx running on the host OS can proxy requests.
    # This prevents direct public access to port 8000, enforcing SSL through Nginx.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
